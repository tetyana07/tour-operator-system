name: Release — Build Installers

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install WiX Toolset v3 (Windows only)
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset --yes
        shell: cmd

      - name: Install RPM tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rpm fakeroot

      - name: Create application.properties from secrets
        shell: bash
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          db.url=${{ secrets.DB_URL }}
          db.user=${{ secrets.DB_USER }}
          db.password=${{ secrets.DB_PASSWORD }}
          weather.api.key=${{ secrets.WEATHER_API_KEY }}
          demo.admin.email=admin@ayvo.ua
          demo.admin.password=admin123
          mail.smtp.host=smtp.gmail.com
          mail.smtp.port=587
          mail.smtp.auth=true
          mail.smtp.starttls=true
          mail.from=noreply@ayvo.ua
          mail.username=${{ secrets.MAIL_USERNAME }}
          mail.password=${{ secrets.MAIL_PASSWORD }}
          mail.dry.run=false
          liqpay.public.key=sandbox_i15291823284
          liqpay.private.key=sandbox_LuMAtqM4X3vtFSEasrIuuMiv8gh35HZPHS5o6sHP
          liqpay.sandbox=true
          EOF

      - name: Build Fat JAR
        run: mvn clean package -DskipTests

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── WINDOWS ──────────────────────────────────────────────────
      - name: Package .msi installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "AYVO" `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --vendor "Betsanych Tetyana" `
            --description "Tour Operator Management System" `
            --input target/ `
            --main-jar tour-operator-system-fat.jar `
            --main-class com.touroperator.ui.Launcher `
            --icon packaging/app.ico `
            --dest dist/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-menu-group "AYVO" `
            --java-options "-Dspring.config.location=file:$env:APPDATA/AYVO/application.properties"

      # ── macOS ─────────────────────────────────────────────────────
      - name: Package .dmg installer (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --type dmg \
            --name "AYVO" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Betsanych Tetyana" \
            --description "Tour Operator Management System" \
            --input target/ \
            --main-jar tour-operator-system-fat.jar \
            --main-class com.touroperator.ui.Launcher \
            --dest dist/ \
            --mac-package-name "ayvo" \
            --mac-package-identifier "com.touroperator.ui" \
            --java-options "-Dspring.config.location=file:\$HOME/Library/Application Support/AYVO/application.properties"

      # ── LINUX ─────────────────────────────────────────────────────
      - name: Package .deb and .rpm installers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # DEB — Ubuntu/Debian
          jpackage \
            --type deb \
            --name "ayvo" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Betsanych Tetyana" \
            --description "Tour Operator Management System" \
            --input target/ \
            --main-jar tour-operator-system-fat.jar \
            --main-class com.touroperator.ui.Launcher \
            --dest dist/ \
            --linux-package-name "ayvo" \
            --linux-app-category "Office" \
            --linux-shortcut \
            --java-options "-Dspring.config.location=file:\$HOME/.config/AYVO/application.properties"

          # RPM — RedHat/Fedora
          jpackage \
            --type rpm \
            --name "ayvo" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Betsanych Tetyana" \
            --description "Tour Operator Management System" \
            --input target/ \
            --main-jar tour-operator-system-fat.jar \
            --main-class com.touroperator.ui.Launcher \
            --dest dist/ \
            --linux-package-name "ayvo" \
            --linux-app-category "Office" \
            --linux-shortcut \
            --java-options "-Dspring.config.location=file:\$HOME/.config/AYVO/application.properties"

          # Fat JAR для будь-якої ОС з Java 21
          cp target/tour-operator-system-fat.jar dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: dist/
          retention-days: 1

  publish-release:
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AYVO ${{ github.ref_name }}"
          body: |
            ## AYVO ${{ github.ref_name }}

            ### Завантаження

            | Платформа | Файл | Примітки |
            |---|---|---|
            | Windows 10/11 | `AYVO-*.msi` | Скопіюйте `application.properties` у `%APPDATA%\AYVO\` |
            | macOS 12+ | `AYVO-*.dmg` | Скопіюйте `application.properties` у `~/Library/Application Support/AYVO/` |
            | Ubuntu/Debian | `ayvo_*.deb` | `sudo dpkg -i *.deb`, конфіг у `~/.config/AYVO/` |
            | RedHat/Fedora | `ayvo-*.rpm` | `sudo rpm -i *.rpm`, конфіг у `~/.config/AYVO/` |
            | Будь-яка ОС (Java 21+) | `*.jar` | `java -jar tour-operator-system-fat.jar` |

            ### Вимоги
            - PostgreSQL (запущений і налаштований)
            - `application.properties` у відповідній папці конфігурації

          files: installers/**
          draft: false
          prerelease: false