name: Release — Build Installers

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install WiX Toolset v3
        run: choco install wixtoolset --yes
        shell: cmd

      - name: Create application.properties from secrets
        shell: bash
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          db.url=${{ secrets.DB_URL }}
          db.user=${{ secrets.DB_USER }}
          db.password=${{ secrets.DB_PASSWORD }}
          weather.api.key=${{ secrets.WEATHER_API_KEY }}
          demo.admin.email=admin@ayvo.ua
          demo.admin.password=admin123
          mail.smtp.host=smtp.gmail.com
          mail.smtp.port=587
          mail.smtp.auth=true
          mail.smtp.starttls=true
          mail.from=noreply@ayvo.ua
          mail.username=${{ secrets.MAIL_USERNAME }}
          mail.password=${{ secrets.MAIL_PASSWORD }}
          mail.dry.run=false
          EOF

      - name: Build Fat JAR
        run: mvn clean package -DskipTests

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package .msi installer
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "AYVO" `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --vendor "Betsanych Tetyana" `
            --description "Tour Operator Management System" `
            --input target/ `
            --main-jar tour-operator-system-fat.jar `
            --main-class com.touroperator.ui.Launcher `
            --icon packaging/app.ico `
            --dest dist/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-menu-group "AYVO" `
            --java-options "-Dspring.config.location=file:$env:APPDATA/AYVO/application.properties"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/
          retention-days: 1

  publish-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AYVO ${{ github.ref_name }}"
          body: |
            ## AYVO ${{ github.ref_name }}

            ### Встановлення
            1. Завантажте `AYVO-*.msi`
            2. Встановіть
            3. Скопіюйте `application.properties` у `%APPDATA%\AYVO\`
            4. Запустіть AYVO

            ### Вимоги
            - Windows 10/11
            - PostgreSQL (запущений)

          files: installers/**
          draft: false
          prerelease: false